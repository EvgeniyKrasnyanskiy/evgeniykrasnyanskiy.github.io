<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Визитка и Чеклист</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: #ffffff;
      --text-main: #2d3436;
      --text-secondary: #636e72;
      --btn-color: #0088cc;
      --btn-text: #ffffff;
      --accent-green: #2ecc71;
      --btn-back: #636e72;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        --card-bg: #1f1f2e;
        --text-main: #f8f9fa;
        --text-secondary: #b2bec3;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: var(--bg-gradient);
      color: var(--text-main);
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 380px;
      min-height: 520px;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      text-align: center;
      transition: all 0.35s ease;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      pointer-events: none;
    }

    .card.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .checklist {
      text-align: left;
      margin: 1.5rem 0;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .check-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(120,120,120,0.06);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .check-item:hover {
      background: rgba(120,120,120,0.12);
    }

    .check-item input {
      margin-right: 12px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent-green);
      flex-shrink: 0;
    }

    .check-item.done span {
      text-decoration: line-through;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      color: var(--btn-text);
      background: var(--btn-color);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .btn.green {
      background: var(--accent-green);
    }

    .btn.back {
      background: var(--btn-back);
      margin-top: 20px;
    }

    /* Стили для категорий и веса */
    .category-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.8rem;
      color: var(--btn-color);
      border-bottom: 1px solid rgba(120,120,120,0.1);
      padding-bottom: 4px;
    }

    .check-item {
      justify-content: space-between;
    }

    .item-info {
      display: flex;
      align-items: center;
      flex-grow: 1;
      margin-right: 10px;
    }

    .weight-input-wrapper {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      margin-left: 10px;
    }

    .weight-input {
      display: block !important;
      width: 70px !important;
      min-width: 70px !important;
      height: 34px !important;
      padding: 0 10px !important;
      border: 1px solid rgba(120,120,120,0.4) !important;
      border-radius: 6px !important;
      background: var(--card-bg) !important;
      color: var(--text-main) !important;
      margin-right: 6px !important;
      text-align: center !important;
      font-family: inherit !important;
      font-size: 16px !important; /* Чтобы избежать зума на iOS */
      transition: all 0.2s ease;
      -webkit-appearance: none !important;
      appearance: none !important;
      -moz-appearance: textfield !important;
    }

    .weight-input::-webkit-outer-spin-button,
    .weight-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .weight-input:focus {
      outline: none;
      border-color: var(--btn-color);
      background: var(--card-bg);
      box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.15);
    }

    .total-weight-card {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(120,120,120,0.06);
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .total-value {
      color: var(--btn-color);
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Главная -->
    <div id="page1" class="card active">
      <div class="emoji">🌲</div>
      <h1>Евгений</h1>
      <p>Любитель гор, лесов и чистого кода.</p>

      <a href="https://t.me/EvgeniyKrasnyanskiy" class="btn">
        Написать в Telegram
      </a>

      <button class="btn green" onclick="showPage('page2')">
        🎒 Чеклист в поход
      </button>
    </div>

    <!-- Чеклист -->
    <div id="page2" class="card">
      <h1>Что взять с собой?</h1>

      <div id="checklist-container" class="checklist">
        <!-- Генерируется через JS -->
      </div>

      <div class="total-weight-card">
        <span>Общий вес:</span>
        <span id="total-weight" class="total-value">0 гр</span>
      </div>

      <button class="btn back" onclick="showPage('page1')">
        ← Назад
      </button>
    </div>

  </div>

  <script>
    const INITIAL_DATA = [
      {
        category: "Основное",
        items: [
          { name: "Смартфон", weight: 200 },
          { name: "e-Sim(Megafon)", weight: 0 },
          { name: "Билет(пропуск)", weight: 1 },
          { name: "Паспорт", weight: 20 },
          { name: "Наличные (5-10тр)", weight: 10 },
          { name: "Рюкзак", weight: 1500 },
          { name: "Палатка(доля)", weight: 1750 },
          { name: "Спальник", weight: 1000 },
          { name: "Коврик", weight: 500 },
          { name: "Трек.палки", weight: 500 }
        ]
      },
      {
        category: "Одежда",
        items: [
          { name: "Панама и шапка", weight: 100 },
          { name: "Очки", weight: 50 },
          { name: "Кроссовки", weight: 400 },
          { name: "Тапочки", weight: 200 },
          { name: "Брюки(на себе)", weight: 100 },
          { name: "Брюки(запас)", weight: 100 },
          { name: "Носки(3 пары)", weight: 100 },
          { name: "Футболка(2 шт)", weight: 150 },
          { name: "Лонгслив(1 шт)", weight: 100 },
          { name: "Трусы(3 шт)", weight: 100 },
          { name: "Дождевик", weight: 100 },
          { name: "Спас-одеяло", weight: 20 },
          { name: "Ветровка", weight: 100 }
        ]
      },
      {
        category: "Еда и посуда",
        items: [
          { name: "Продукты", weight: 2000 },
          { name: "Нож", weight: 100 },
          { name: "Газ и горелка(доля)", weight: 200 },
          { name: "Котелок/посуда(доля)", weight: 400 },
          { name: "Кружка", weight: 30 },
          { name: "Ложка/вилка", weight: 20 },
          { name: "Салфетки", weight: 50 },
          { name: "Бутылка 0.5л(2шт)", weight: 1000 }
        ]
      },
      {
        category: "Прочее",
        items: [
          { name: "Спички", weight: 50 },
          { name: "Крем от солнца", weight: 50 },
          { name: "Крем для кожи", weight: 50 },
          { name: "Зубная паста/щетка", weight: 50 },
          { name: "Шампунь/мыло", weight: 20 },
          { name: "Туалетная(влаж) бум", weight: 100 },
          { name: "Полотенце(корот)", weight: 100 },
          { name: "Фонарик", weight: 150 },
          { name: "Таблетки", weight: 10 },
          { name: "Пластыри", weight: 10 },
          { name: "Бинт", weight: 20 },
          { name: "Нитки и иголка", weight: 10 },
          { name: "Мусорные пакеты", weight: 10 }
        ]
      }
    ];

    let hikingData = JSON.parse(localStorage.getItem('hiking-inventory')) || INITIAL_DATA;

    function showPage(pageId) {
      document.querySelectorAll('.card').forEach(card => {
        card.classList.remove('active');
      });
      requestAnimationFrame(() => {
        document.getElementById(pageId).classList.add('active');
      });
    }

    function saveData() {
      localStorage.setItem('hiking-inventory', JSON.stringify(hikingData));
    }

    function updateTotal() {
      let total = 0;
      hikingData.forEach(cat => {
        cat.items.forEach(item => {
          total += Number(item.weight) || 0;
        });
      });
      document.getElementById('total-weight').textContent = total + ' гр';
    }

    function renderChecklist() {
      const container = document.getElementById('checklist-container');
      container.innerHTML = '';

      hikingData.forEach((cat, catIdx) => {
        const catTitle = document.createElement('div');
        catTitle.className = 'category-title';
        catTitle.textContent = cat.category;
        container.appendChild(catTitle);

        cat.items.forEach((item, itemIdx) => {
          const label = document.createElement('label');
          label.className = 'check-item' + (item.checked ? ' done' : '');
          
          label.innerHTML = `
            <div class="item-info">
              <input type="checkbox" ${item.checked ? 'checked' : ''}>
              <span>${item.name}</span>
            </div>
            <div class="weight-input-wrapper">
              <input type="number" class="weight-input" value="${item.weight}" min="0">
              <span>гр</span>
            </div>
          `;

          // Логика чекбокса
          const checkbox = label.querySelector('input[type="checkbox"]');
          checkbox.addEventListener('change', () => {
            item.checked = checkbox.checked;
            label.classList.toggle('done', item.checked);
            saveData();
          });

          // Логика ввода веса
          const weightInput = label.querySelector('.weight-input');
          weightInput.addEventListener('input', () => {
            item.weight = weightInput.value;
            updateTotal();
            saveData();
          });

          // Остановка всплытия события клика при вводе веса
          weightInput.addEventListener('click', (e) => e.stopPropagation());

          container.appendChild(label);
        });
      });

      updateTotal();
    }

    // Инициализация
    renderChecklist();
  </script>

</body>
</html>
