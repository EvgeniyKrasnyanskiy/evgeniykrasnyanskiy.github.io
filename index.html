<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Визитка и Чеклист</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-bg: #ffffff;
      --text-main: #2d3436;
      --text-secondary: #636e72;
      --btn-color: #0088cc;
      --btn-text: #ffffff;
      --accent-green: #2ecc71;
      --btn-back: #636e72;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        --card-bg: #1f1f2e;
        --text-main: #f8f9fa;
        --text-secondary: #b2bec3;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      background: var(--bg-gradient);
      color: var(--text-main);
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      padding: 2rem 1.5rem;
      border-radius: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      text-align: center;
      transition: all 0.35s ease;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      pointer-events: none;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
      }

      .container {
        max-width: 100%;
      }

      .card {
        border-radius: 0;
        padding: 1.5rem 1rem 2.5rem; /* Безопасный отступ снизу */
        height: 100%;
        width: 100%;
      }
    }

    .card.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .checklist {
      text-align: left;
      margin: 1rem 0;
      flex-grow: 1;
      overflow-y: auto;
      padding-right: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .check-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(120, 120, 120, 0.06);
      border-radius: 12px;
      cursor: grab;
      transition: 0.2s;
      user-select: none;
    }

    .check-item.dragging {
      opacity: 0.4;
      background: var(--btn-color);
      transform: scale(0.95);
    }

    .check-item:hover {
      background: rgba(120, 120, 120, 0.12);
    }

    .check-item input {
      margin-right: 12px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent-green);
      flex-shrink: 0;
    }

    .check-item.done span {
      text-decoration: line-through;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      color: var(--btn-text);
      background: var(--btn-color);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .btn.green {
      background: var(--accent-green);
    }

    .btn.back {
      background: var(--btn-back);
      margin-top: 20px;
    }

    /* Стили для категорий и веса */
    .category-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.8rem;
      color: var(--btn-color);
      border-bottom: 1px solid rgba(120, 120, 120, 0.1);
      padding-bottom: 4px;
    }

    .check-item {
      justify-content: space-between;
    }

    .item-info {
      display: flex;
      align-items: center;
      flex-grow: 1;
      margin-right: 10px;
    }

    .weight-input-wrapper {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      flex: 0 0 95px;
      /* Фиксированная ширина для правой части */
      justify-content: flex-end;
    }

    .weight-input {
      width: 60px !important;
      height: 28px !important;
      padding: 0 5px !important;
      border: 1px solid rgba(0, 0, 0, 0.2) !important;
      border-radius: 4px !important;
      background: #fff !important;
      color: #000 !important;
      margin-right: 5px !important;
      text-align: center !important;
      font-family: inherit !important;
      font-size: 14px !important;
      -webkit-appearance: none;
      appearance: none;
      -moz-appearance: textfield;
    }

    .weight-input::-webkit-outer-spin-button,
    .weight-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .weight-input:focus {
      outline: none;
      border-color: var(--btn-color);
      background: var(--card-bg);
      box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.15);
    }

    /* Кнопки управления */
    .btn-del {
      background: none;
      border: none;
      color: #ff7675;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 5px;
      margin-left: 5px;
      line-height: 1;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }

    .btn-del:hover {
      transform: scale(1.2);
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      background: rgba(120, 120, 120, 0.08);
      border: 1px dashed rgba(120, 120, 120, 0.3);
      border-radius: 10px;
      padding: 8px 12px;
      margin: 10px 0 20px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-add:hover {
      background: rgba(120, 120, 120, 0.12);
      border-color: var(--btn-color);
      color: var(--btn-color);
    }

    .total-weight-card {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(120, 120, 120, 0.06);
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .total-value {
      color: var(--btn-color);
      font-size: 1.4rem;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
      transition: color 0.5s ease;
    }

    /* Иконка помощи */
    .help-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--btn-color);
      color: white;
      border-radius: 50%;
      font-size: 0.9rem;
      margin-left: 8px;
      cursor: pointer;
      vertical-align: middle;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }

    .help-icon:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Главная -->
    <div id="page1" class="card active">
      <div class="emoji">🌲</div>
      <h1>Евгений</h1>
      <p>Любитель гор, лесов и чистого кода.</p>

      <a href="https://t.me/EvgeniyKrasnyanskiy" class="btn">
        Написать в Telegram
      </a>

      <button class="btn green" onclick="showPage('page2')">
        🎒 Чеклист в поход
      </button>
    </div>

    <!-- Чеклист -->
    <div id="page2" class="card">
      <h1 style="display: flex; align-items: center; justify-content: center;">
        Что взять с собой
        <span class="help-icon" onclick="showExpertHelp()">?</span>
      </h1>

      <div id="checklist-container" class="checklist">
        <!-- Генерируется через JS -->
      </div>

      <div class="total-weight-card">
        <span>Общий вес:</span>
        <span id="total-weight" class="total-value">0 гр</span>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button class="btn back" style="background: #e67e22; margin-top: 0; font-size: 0.75rem; padding: 10px;"
          onclick="resetToDefault()">
          ↺ Вернуть шаблон
        </button>
        <button class="btn back" style="background: #e74c3c; margin-top: 0; font-size: 0.75rem; padding: 10px;"
          onclick="clearAllData()">
          🗑 Очистить всё
        </button>
      </div>

      <button class="btn back" onclick="showPage('page1')">
        ← Назад
      </button>

      <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 15px; opacity: 0.5;">
        v2.2 | Mobile Fix
      </div>
    </div>

  </div>

  <script>
    const APP_VERSION = "2.2";

    const INITIAL_DATA = [
      {
        category: "Основное",
        items: [
          { name: "Смартфон", weight: 200 },
          { name: "e-Sim(Megafon)", weight: 0 },
          { name: "Билет(пропуск)", weight: 1 },
          { name: "Паспорт", weight: 20 },
          { name: "Наличные (5-10тр)", weight: 10 },
          { name: "Рюкзак", weight: 1500 },
          { name: "Палатка(доля)", weight: 1750 },
          { name: "Спальник", weight: 1000 },
          { name: "Коврик", weight: 500 },
          { name: "Трек.палки", weight: 500 }
        ]
      },
      {
        category: "Одежда",
        items: [
          { name: "Панама и шапка", weight: 100 },
          { name: "Очки", weight: 50 },
          { name: "Кроссовки", weight: 400 },
          { name: "Тапочки", weight: 200 },
          { name: "Брюки(на себе)", weight: 100 },
          { name: "Брюки(запас)", weight: 100 },
          { name: "Носки(3 пары)", weight: 100 },
          { name: "Футболка(2 шт)", weight: 150 },
          { name: "Лонгслив(1 шт)", weight: 100 },
          { name: "Трусы(3 шт)", weight: 100 },
          { name: "Дождевик", weight: 100 },
          { name: "Спас-одеяло", weight: 20 },
          { name: "Ветровка", weight: 100 }
        ]
      },
      {
        category: "Еда и посуда",
        items: [
          { name: "Продукты", weight: 2000 },
          { name: "Нож", weight: 100 },
          { name: "Газ и горелка(доля)", weight: 200 },
          { name: "Котелок/посуда(доля)", weight: 400 },
          { name: "Кружка", weight: 30 },
          { name: "Ложка/вилка", weight: 20 },
          { name: "Салфетки", weight: 50 },
          { name: "Бутылка 0.5л(2шт)", weight: 1000 }
        ]
      },
      {
        category: "Прочее",
        items: [
          { name: "Спички", weight: 50 },
          { name: "Крем от солнца", weight: 50 },
          { name: "Крем для кожи", weight: 50 },
          { name: "Зубная паста/щетка", weight: 50 },
          { name: "Шампунь/мыло", weight: 20 },
          { name: "Туалетная(влаж) бум", weight: 100 },
          { name: "Полотенце(корот)", weight: 100 },
          { name: "Фонарик", weight: 150 },
          { name: "Таблетки", weight: 10 },
          { name: "Пластыри", weight: 10 },
          { name: "Бинт", weight: 20 },
          { name: "Нитки и иголка", weight: 10 },
          { name: "Мусорные пакеты", weight: 10 }
        ]
      }
    ];

    function migrateData(saved) {
      if (!saved) return { version: APP_VERSION, categories: INITIAL_DATA };
      if (saved.version === APP_VERSION) return saved;

      const mergedCategories = INITIAL_DATA.map(initCat => {
        const savedCat = (Array.isArray(saved) ? saved : (saved.categories || [])).find(c => c.category === initCat.category);
        if (!savedCat) return initCat;

        const mergedItems = initCat.items.map(initItem => {
          const savedItem = savedCat.items.find(i => i.name === initItem.name);
          return savedItem ? { ...initItem, ...savedItem } : initItem;
        });

        const userItems = savedCat.items.filter(si => !initCat.items.find(ii => ii.name === si.name));

        return {
          ...initCat,
          items: [...mergedItems, ...userItems]
        };
      });

      return { version: APP_VERSION, categories: mergedCategories };
    }

    let rawStorage = localStorage.getItem('hiking-inventory');
    let hikingState = migrateData(rawStorage ? JSON.parse(rawStorage) : null);
    let hikingData = hikingState.categories;

    function showPage(pageId) {
      document.querySelectorAll('.card').forEach(card => {
        card.classList.remove('active');
      });
      requestAnimationFrame(() => {
        document.getElementById(pageId).classList.add('active');
      });
    }

    function saveData() {
      localStorage.setItem('hiking-inventory', JSON.stringify({
        version: APP_VERSION,
        categories: hikingData
      }));
    }

    function resetToDefault() {
      if (confirm('Вернуть стандартный список вещей? Все ваши изменения будут удалены.')) {
        localStorage.removeItem('hiking-inventory');
        hikingData = JSON.parse(JSON.stringify(INITIAL_DATA));
        renderChecklist();
      }
    }

    function clearAllData() {
      if (confirm('Удалить ВООБЩЕ все вещи из списка? Это позволит составить свой список с нуля.')) {
        hikingData.forEach(cat => cat.items = []);
        renderChecklist();
        saveData();
      }
    }

    function showExpertHelp() {
      const helpText = `📖 ШКАЛА ИДЕАЛЬНОГО ВЕСА:

1. ОСНОВНОЕ (Рюкзак, палатка, спальник...):
• Идеал: 3.5 – 4.5 кг
• Оптимально: 5.0 – 6.0 кг
• Тяжело: 6.5 – 8.0 кг
• Критично: > 9.0 кг

2. ОДЕЖДА И ОБУВЬ:
• Идеал: 1.0 – 1.5 кг
• Оптимально: 1.5 – 2.2 кг
• Тяжело: 2.5 – 3.5 кг
• Критично: > 4.0 кг

3. ЕДА И КУХНЯ:
• Идеал: 1.8 – 2.2 кг
• Оптимально: 2.5 – 3.0 кг
• Тяжело: 3.5 – 4.5 кг
• Критично: > 5.0 кг

4. ПРОЧЕЕ И ГИГИЕНА:
• Идеал: 0.5 – 0.8 кг
• Оптимально: 1.0 – 1.5 кг
• Тяжело: 2.0 – 2.5 кг
• Критично: > 3.0 кг

🏆 ИТОГОВЫЙ ВЕС (на спине):
• Идеал: 6 – 8 кг (Fastpacking)
• Оптимально: 9 – 11 кг (Lightweight)
• Тяжело: 14 – 16 кг (Classic)
• Критично: > 18 кг (Risk)`;

      alert(helpText);
    }

    function formatW(grams) {
      return Math.round(grams).toLocaleString('ru-RU').replace(/,/g, ' ');
    }

    function getWeightColor(grams) {
      const kg = (grams / 1000).toFixed(1);
      const formatted = formatW(grams);

      if (grams <= 8000) return { color: "#2ecc71", advice: `Идеал: Ваш вес ${kg} кг (${formatted} гр). Вы буквально бежите по тропе! Уровень Fastpacking.` };
      if (grams <= 11000) return { color: "#f1c40f", advice: `Оптимально: Ваш вес ${kg} кг (${formatted} гр). Позволяет идти бодро и не умирать к вечеру. Уровень Lightweight.` };
      if (grams <= 14000) return { color: "#e67e22", advice: `Выше оптимального: Ваш вес ${kg} кг (${formatted} гр). Начинает чувствоваться нагрузка. Стоит подумать об оптимизации.` };
      if (grams <= 18000) return { color: "#d35400", advice: `Тяжело: Ваш вес ${kg} кг (${formatted} гр). Стандартный походный вес (Classic). Ощутимая нагрузка на колени и позвоночник.` };
      return { color: "#c0392b", advice: `Критично: Ваш вес ${kg} кг (${formatted} гр). Огромный риск травм и быстрой утомляемости. Нужно срочно что-то выложить!` };
    }

    function getCategoryWeightColor(category, grams) {
      const kg = grams / 1000;

      if (category.includes("Основное")) {
        if (kg <= 4.5) return { color: "#2ecc71", advice: "Идеально (3.5–4.5 кг): Ультралегкий рюкзак, пуховый спальник, легкая палатка. Здесь вес сбрасывается эффективнее всего." };
        if (kg <= 6.0) return { color: "#f1c40f", advice: "Оптимально (5.0–6.0 кг): Комфортный вес для качественного современного снаряжения." };
        if (kg <= 9.0) return { color: "#e67e22", advice: "Тяжело (6.5–8.0 кг): Вес начинает заметно давить на плечи через 4-5 часов активного хода." };
        return { color: "#e74c3c", advice: "Критично (> 9.0 кг): Только база весит столько, сколько должен весить весь рюкзак! Нужно менять снаряжение." };
      }

      if (category.includes("Одежда")) {
        if (kg <= 1.5) return { color: "#2ecc71", advice: "Идеально (1.0–1.5 кг): Технологичный минимум (мембрана, отвод влаги). Минимум сменки." };
        if (kg <= 2.2) return { color: "#f1c40f", advice: "Оптимально (1.5–2.2 кг): Включая тапочки для лагеря и полноценный теплый слой." };
        if (kg <= 4.0) return { color: "#e67e22", advice: "Тяжело (2.5–3.5 кг): Лишние джинсы, хлопковые футболки, тяжелые шерстяные свитера." };
        return { color: "#e74c3c", advice: "Критично (> 4.0 кг): Слишком много «запасных» вещей, которые останутся на дне рюкзака." };
      }

      if (category.includes("Еда") || category.includes("Кухня")) {
        if (kg <= 2.2) return { color: "#2ecc71", advice: "Идеально (1.8–2.2 кг): Сублиматы, титановая посуда, строгий расчет 500г еды в день." };
        if (kg <= 3.5) return { color: "#f1c40f", advice: "Оптимально (2.5–3.0 кг): Хорошая раскладка, газ с запасом, стандартная надежная горелка." };
        if (kg <= 5.0) return { color: "#e67e22", advice: "Тяжело (3.5–4.5 кг): Тяжелые консервы, лишняя посуда, избыток неучтенных продуктов." };
        return { color: "#e74c3c", advice: "Критично (> 5.0 кг): Стеклянные банки, «бабушкины» запасы, лишнее топливо. Вес еды должен таять!" };
      }

      if (category.includes("Прочее") || category.includes("Гигиена")) {
        if (kg <= 0.8) return { color: "#2ecc71", advice: "Идеально (0.5–0.8 кг): Мини-тюбики, только нужные таблетки, компактный легкий Powerbank." };
        if (kg <= 1.5) return { color: "#f1c40f", advice: "Оптимально (1.0–1.5 кг): Полная аптечка, средства гигиены, смартфон, документы." };
        if (kg <= 3.0) return { color: "#e67e22", advice: "Тяжело (2.0–2.5 кг): Полноразмерные шампуни, книги, тяжелые инструменты, ножи." };
        return { color: "#e74c3c", advice: "Критично (> 3.0 кг): Огромные косметички, лишняя электроника или книги в твердом переплете." };
      }

      return { color: "#636e72", advice: "Категория без спецификации веса. Старайтесь держать минимум." };
    }

    function getItemWeightColor(grams) {
      if (grams <= 150) return "rgba(46, 204, 113, 0.4)"; // Легкий
      if (grams <= 500) return "rgba(241, 196, 15, 0.6)"; // Заметный
      if (grams <= 1500) return "rgba(230, 126, 34, 0.8)"; // Тяжелый
      return "rgba(192, 57, 43, 1)"; // Критический
    }

    function updateTotal() {
      let total = 0;
      hikingData.forEach(cat => {
        cat.items.forEach(item => {
          const w = parseFloat(item.weight);
          if (!isNaN(w)) total += w;
        });
      });
      const totalRes = getWeightColor(total);
      const totalEl = document.getElementById('total-weight');
      totalEl.textContent = formatW(total) + ' гр';
      totalEl.style.color = totalRes.color;
      totalEl.style.cursor = 'help';
      totalEl.title = totalRes.advice;
      totalEl.onclick = () => alert(totalRes.advice);
    }

    function deleteItem(catIdx, itemIdx) {
      if (confirm('Удалить эту вещь?')) {
        hikingData[catIdx].items.splice(itemIdx, 1);
        renderChecklist();
        saveData();
      }
    }

    function addItem(catIdx) {
      const name = prompt('Название новой вещи:');
      if (!name) return;
      const weight = prompt('Вес в граммах:', '0');

      hikingData[catIdx].items.push({
        name: name,
        weight: weight || 0,
        checked: false
      });

      renderChecklist();
      saveData();
    }

    function renderChecklist() {
      const container = document.getElementById('checklist-container');
      container.innerHTML = '';

      hikingData.forEach((cat, catIdx) => {
        // Считаем вес категории
        let catTotal = 0;
        cat.items.forEach(item => {
          const w = parseFloat(item.weight);
          if (!isNaN(w)) catTotal += w;
        });

        const catHeader = document.createElement('div');
        catHeader.className = 'category-title';
        catHeader.style.display = 'flex';
        catHeader.style.justifyContent = 'space-between';

        const catRes = getCategoryWeightColor(cat.category, catTotal);

        catHeader.innerHTML = `
          <span>${cat.category}</span>
          <span style="font-size: 0.8rem; font-weight: 600; color: ${catRes.color}; cursor: help;" 
                title="${catRes.advice}" 
                onclick="alert('${catRes.advice}')">
            ${formatW(catTotal)} гр
          </span>
        `;
        container.appendChild(catHeader);

        cat.items.forEach((item, itemIdx) => {
          const itemW = parseFloat(item.weight) || 0;
          const itemColor = getItemWeightColor(itemW);

          const label = document.createElement('label');
          label.className = 'check-item' + (item.checked ? ' done' : '');
          label.style.borderLeft = `4px solid ${itemColor}`;
          label.draggable = true;

          label.innerHTML = `
            <div class="item-info">
              <span style="margin-right: 10px; opacity: 0.3; font-size: 0.8rem; cursor: grab;">☰</span>
              <input type="checkbox" ${item.checked ? 'checked' : ''}>
              <span>${item.name}</span>
            </div>
            <div class="weight-input-wrapper">
              <input type="number" class="weight-input" value="${item.weight}" min="0" style="color: ${itemColor}; font-weight: 600;">
              <span style="color: ${itemColor}; opacity: 0.8;">гр</span>
              <button class="btn-del" onclick="event.preventDefault(); deleteItem(${catIdx}, ${itemIdx})">×</button>
            </div>
          `;

          // Drag and Drop события
          label.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({ catIdx, itemIdx }));
            label.classList.add('dragging');
          });

          label.addEventListener('dragend', () => label.classList.remove('dragging'));

          label.addEventListener('dragover', (e) => e.preventDefault());

          label.addEventListener('drop', (e) => {
            e.preventDefault();
            const source = JSON.parse(e.dataTransfer.getData('text/plain'));
            const target = { catIdx, itemIdx };

            if (source.catIdx === target.catIdx && source.itemIdx !== target.itemIdx) {
              // Перемещение внутри одной категории
              const items = hikingData[source.catIdx].items;
              const [movedItem] = items.splice(source.itemIdx, 1);
              items.splice(target.itemIdx, 0, movedItem);
              saveData();
              renderChecklist();
            } else if (source.catIdx !== target.catIdx) {
              // Перемещение между категориями
              const sourceItems = hikingData[source.catIdx].items;
              const targetItems = hikingData[target.catIdx].items;
              const [movedItem] = sourceItems.splice(source.itemIdx, 1);
              targetItems.splice(target.itemIdx, 0, movedItem);
              saveData();
              renderChecklist();
            }
          });

          // Логика чекбокса
          const checkbox = label.querySelector('input[type="checkbox"]');
          checkbox.addEventListener('change', () => {
            item.checked = checkbox.checked;
            label.classList.toggle('done', item.checked);
            saveData();
          });

          // Логика ввода веса
          const weightInput = label.querySelector('.weight-input');
          weightInput.addEventListener('input', () => {
            item.weight = weightInput.value;
            renderChecklist();
            saveData();
          });

          weightInput.addEventListener('click', (e) => e.stopPropagation());

          container.appendChild(label);
        });

        // Кнопка добавления в категорию
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add';
        addBtn.innerHTML = '<span>+ Добавить вещь</span>';
        addBtn.onclick = () => addItem(catIdx);
        container.appendChild(addBtn);
      });

      updateTotal();
    }

    // Инициализация
    renderChecklist();
  </script>

</body>

</html>
